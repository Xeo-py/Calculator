<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>The Basic Calculator</h1>
        <div class="cal">
            <div  class="disp">
                <p></p>
            </div>
            <div class="row1">
                <button>9</button>
                <button>8</button>
                <button>7</button>
                <button>+</button>
            </div>
            <div class="row2">
                <button>6</button>
                <button>5</button>
                <button>4</button>
                <button>-</button>
            </div>
            <div class="row3">
                <button>3</button>
                <button>2</button>
                <button>1</button>
                <button>/</button>
            </div>
            <div class="row4">
                <button>.</button>
                <button>0</button>
                <button>*</button>
                <button>=</button>
            </div>
            <div class="row5">
                <button class="last">CLEAR</button>
                <button class="last">BACK</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
